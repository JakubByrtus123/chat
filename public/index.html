<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Chat</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/emoji-mart@latest/dist/browser.js"></script>
</head>
<body>
    <button id="dark-mode-toggle" class="dark-mode-btn" type="button">🌙</button>

    <main class="chat-container">
        <h1>Class chat</h1>
        <div id="messages" class="messages"></div>
        <div id="typing-indicator" class="typing-indicator"></div>
        
        <section class="input-area">
            <input id="name" type="text" placeholder="Your name">
            
            <div class="message-input-wrapper">
                <button id="code-toggle" class="format-btn" type="button" title="Formátovat jako kód">Code</button>
                <input id="message" type="text" placeholder="Type a message">
                <button id="emoji-trigger" type="button">🥰</button> 
            </div>

            <button id="mentor-toggle" class="mentor-btn" type="button" title="Zapnout režim mentora">🎓 Mentor</button>
            <button id="send">Send</button>
            
            <div id="picker-container" style="display: none; position: absolute; bottom: 80px; right: 20px; z-index: 100;"></div>
        </section>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
