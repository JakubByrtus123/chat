<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat</title>
    <link rel="stylesheet" href="style.css">
    <base target="_blank">
</head>
<body>
    <main class="chat-container">
        <header class="chat-header">
            <div class="header-user">
                <button id="avatar-button" class="avatar-button header-avatar" type="button" title="Change profile picture" aria-label="Change profile picture"></button>
                <input id="avatar-input" type="file" accept="image/*" hidden>
                <input id="name" type="text" placeholder="Your name" aria-label="Your name" readonly autocomplete="off">
            </div>
            <div class="header-actions">
                <button id="sound-toggle" class="icon-btn sound-toggle-btn" type="button" aria-label="Mute notification sounds" title="Notification sounds on">
                    <svg class="sound-icon sound-icon-on" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M11 5 6 9H3v6h3l5 4V5Z"></path>
                        <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
                        <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
                    </svg>
                    <svg class="sound-icon sound-icon-off" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M11 5 6 9H3v6h3l5 4V5Z"></path>
                        <path d="m22 9-6 6"></path>
                        <path d="m16 9 6 6"></path>
                    </svg>
                </button>
            </div>
        </header>

        <div id="messages" class="messages"></div>
        <div id="typing-indicator" class="typing-indicator"></div>

        <section class="input-area">
            <div id="attachment-chip" class="attachment-chip" style="display:none">
                <span id="attachment-name"></span>
                <button id="attachment-clear" class="icon-btn" type="button" aria-label="Remove attachment">&#10005;</button>
            </div>

            <div class="message-input-wrapper">
                <textarea id="message" rows="1" placeholder="Type a message" aria-label="Message" autocomplete="off" maxlength="1000"></textarea>
                <button id="voice-trigger" class="icon-btn voice-btn" type="button" title="Hold to record voice" aria-label="Hold to record voice">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>

            <div class="input-toolbar">
                <button id="file-trigger" class="icon-btn toolbar-btn file-btn" type="button" title="Attach file" aria-label="Attach file">&#128206;</button>
                <button id="code-toggle" class="format-btn icon-btn toolbar-btn" type="button" title="Format as code" aria-label="Format as code">&lt;/&gt;</button>
                <button id="emoji-trigger" class="icon-btn toolbar-btn" type="button" title="Emoji" aria-label="Emoji">&#128512;</button>
                <div class="toolbar-spacer"></div>
                <button id="send" class="send-btn icon-btn toolbar-btn" type="button" title="Send message" aria-label="Send message">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M22 2 11 13"></path>
                        <path d="m22 2-7 20-4-9-9-4Z"></path>
                    </svg>
                </button>
            </div>

            <input id="file-input" type="file" hidden>
            <div id="picker-container"></div>
        </section>

        <div id="recording-overlay" class="recording-overlay" style="display:none">
            <div class="recording-pulse"></div>
            <div class="recording-info">
                <div id="recording-timer" class="recording-timer">0:00</div>
                <div class="recording-hint">Release to send</div>
            </div>
        </div>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script type="module" src="script.js"></script>
</body>
</html>
